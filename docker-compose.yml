# Crazy Converterator - Docker Compose Configuration
# Run the full stack locally with: docker-compose up --build
#
# For Ollama (local, free):
#   1. Run Ollama on host: ollama serve
#   2. Set: LLM_PROVIDER=ollama OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
#
# For Groq (cloud, free):
#   Set: LLM_PROVIDER=groq GROQ_API_KEY=your_key LLM_MODEL=llama-3.3-70b-versatile

version: '3.8'

services:
  # ==========================================================================
  # Backend: FastAPI + Rust conversion module
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # LLM Provider: ollama (default), groq, openai, anthropic
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5-coder:7b}
      # Ollama: use host.docker.internal to connect to Ollama on host machine
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      # API keys (only needed for cloud providers)
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ==========================================================================
  # Frontend: Nuxt 3 (development mode)
  # For production, use the static build with nginx instead
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Mount source for hot reload during development
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

networks:
  default:
    driver: bridge

