# Crazy Converterator - Docker Compose Configuration
# Run the full stack locally with: docker-compose up --build

version: '3.8'

services:
  # ==========================================================================
  # Backend: FastAPI + Rust conversion module
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ==========================================================================
  # Frontend: Nuxt 3 (development mode)
  # For production, use the static build with nginx instead
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Mount source for hot reload during development
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

networks:
  default:
    driver: bridge

